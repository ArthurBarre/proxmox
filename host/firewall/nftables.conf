#!/usr/sbin/nft -f
# /etc/nftables.conf — Proxmox host firewall
# Stratégie : tout bloquer sauf le strict minimum sur l'IP publique

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback
        iif lo accept

        # Connexions établies
        ct state established,related accept

        # ICMP (ping)
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # SSH (temporaire sur IP publique — couper une fois Tailscale OK)
        # tcp dport 22 accept

        # SSH via Tailscale uniquement
        iifname "tailscale0" tcp dport 22 accept

        # Proxmox web UI via Tailscale uniquement
        iifname "tailscale0" tcp dport 8006 accept

        # HTTP/HTTPS (sera DNAT vers Traefik, mais on accepte aussi en input)
        tcp dport { 80, 443 } accept

        # Tailscale (WireGuard)
        udp dport 41641 accept

        # Réseau privé VMs (vmbr1)
        iifname "vmbr1" accept

        # Log et drop le reste
        log prefix "nftables-drop: " limit rate 5/minute
        drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # Connexions établies
        ct state established,related accept

        # VMs vers internet (NAT)
        iifname "vmbr1" oifname "vmbr0" accept

        # Internet vers VM gateway (DNAT HTTP/HTTPS)
        iifname "vmbr0" oifname "vmbr1" ip daddr 10.10.10.2 tcp dport { 80, 443 } accept

        # Inter-VM
        iifname "vmbr1" oifname "vmbr1" accept

        # Tailscale vers VMs
        iifname "tailscale0" oifname "vmbr1" accept
        iifname "vmbr1" oifname "tailscale0" accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority -100;

        # DNAT HTTP/HTTPS vers VM gateway (Traefik)
        iifname "vmbr0" tcp dport 80  dnat to 10.10.10.2:80
        iifname "vmbr0" tcp dport 443 dnat to 10.10.10.2:443
    }

    chain postrouting {
        type nat hook postrouting priority 100;

        # Masquerade pour le NAT des VMs
        oifname "vmbr0" ip saddr 10.10.10.0/24 masquerade
    }
}
