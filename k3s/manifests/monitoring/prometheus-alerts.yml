apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: node
        rules:
          - alert: HighCpuUsage
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU > 80% sur {{ $labels.instance }}"
              description: "CPU a {{ $value | printf \"%.1f\" }}% depuis 5 min"

          - alert: HighMemoryUsage
            expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "RAM > 85% sur {{ $labels.instance }}"
              description: "RAM a {{ $value | printf \"%.1f\" }}%"

          - alert: DiskSpaceLow
            expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 85
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Disque > 85% sur {{ $labels.instance }}"
              description: "Disque a {{ $value | printf \"%.1f\" }}%"

          - alert: NodeDown
            expr: up{job=~"node-exporter.*"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node down : {{ $labels.instance }}"
              description: "Node injoignable depuis 2 min"

      - name: kubernetes
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} crash loop"
              description: "Plus de 3 restarts en 15 min"

          - alert: PodNotReady
            expr: kube_pod_status_phase{phase=~"Pending|Unknown|Failed"} > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
              description: "Pod en {{ $labels.phase }} depuis 10 min"

          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas != kube_deployment_status_ready_replicas
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} incomplete"
              description: "Replicas demandes != replicas ready depuis 10 min"

      - name: prometheus
        rules:
          - alert: PrometheusTargetDown
            expr: up == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Target down : {{ $labels.job }}/{{ $labels.instance }}"
              description: "Target Prometheus injoignable depuis 5 min"
