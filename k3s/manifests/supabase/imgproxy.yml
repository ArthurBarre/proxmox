apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-imgproxy
  namespace: supabase
  labels:
    app: supabase-imgproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-imgproxy
  template:
    metadata:
      labels:
        app: supabase-imgproxy
    spec:
      containers:
        - name: imgproxy
          image: darthsim/imgproxy:v3.8.0
          ports:
            - containerPort: 5001
          env:
            - name: IMGPROXY_BIND
              value: ":5001"
            - name: IMGPROXY_LOCAL_FILESYSTEM_ROOT
              value: /
            - name: IMGPROXY_USE_ETAG
              value: "true"
            - name: IMGPROXY_ENABLE_WEBP_DETECTION
              value: "true"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-imgproxy
  namespace: supabase
spec:
  type: ClusterIP
  selector:
    app: supabase-imgproxy
  ports:
    - port: 5001
      targetPort: 5001
