apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-meta
  namespace: supabase
  labels:
    app: supabase-meta
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-meta
  template:
    metadata:
      labels:
        app: supabase-meta
    spec:
      initContainers:
        - name: wait-for-db
          image: supabase/postgres:15.8.1.085
          command: ["sh", "-c", "until pg_isready -h supabase-db.supabase.svc.cluster.local -p 5432; do sleep 2; done"]
      containers:
        - name: postgres-meta
          image: supabase/postgres-meta:v0.84.2
          ports:
            - containerPort: 8080
          env:
            - name: PG_META_PORT
              value: "8080"
            - name: PG_META_DB_HOST
              value: supabase-db.supabase.svc.cluster.local
            - name: PG_META_DB_PORT
              value: "5432"
            - name: PG_META_DB_NAME
              value: postgres
            - name: PG_META_DB_USER
              value: supabase_admin
            - name: PG_META_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: postgres-password
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-meta
  namespace: supabase
spec:
  type: ClusterIP
  selector:
    app: supabase-meta
  ports:
    - port: 8080
      targetPort: 8080
