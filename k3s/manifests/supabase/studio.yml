apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-studio
  namespace: supabase
  labels:
    app: supabase-studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-studio
  template:
    metadata:
      labels:
        app: supabase-studio
    spec:
      containers:
        - name: studio
          image: supabase/studio:20250317-6955350
          ports:
            - containerPort: 3000
          env:
            - name: HOSTNAME
              value: "::"
            - name: STUDIO_PORT
              value: "3000"
            - name: SUPABASE_URL
              value: "http://supabase-kong.supabase.svc.cluster.local:8000"
            - name: STUDIO_PG_META_URL
              value: "http://supabase-meta.supabase.svc.cluster.local:8080"
            - name: SUPABASE_PUBLIC_URL
              value: "https://supabase.arthurbarre.fr"
            - name: POSTGRES_HOST
              value: "supabase-db.supabase.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: postgres-password
            - name: DEFAULT_ORGANIZATION_NAME
              value: "arthurbarre"
            - name: DEFAULT_PROJECT_NAME
              value: "default"
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: anon-key
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: service-role-key
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: jwt-secret
            - name: NEXT_PUBLIC_ENABLE_LOGS
              value: "true"
            - name: NEXT_ANALYTICS_BACKEND_PROVIDER
              value: "postgres"
            - name: LOGFLARE_API_KEY
              value: "dummy"
            - name: LOGFLARE_URL
              value: "http://localhost"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 60
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-studio
  namespace: supabase
spec:
  type: NodePort
  selector:
    app: supabase-studio
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30095
