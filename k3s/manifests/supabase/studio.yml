apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-studio
  namespace: supabase
  labels:
    app: supabase-studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-studio
  template:
    metadata:
      labels:
        app: supabase-studio
    spec:
      containers:
        - name: studio
          image: supabase/studio:2026.04.08-sha-205cbe7
          ports:
            - containerPort: 3000
          env:
            - name: STUDIO_DEFAULT_ORGANIZATION
              value: "arthurbarre"
            - name: STUDIO_DEFAULT_PROJECT
              value: "default"
            - name: STUDIO_PORT
              value: "3000"
            - name: SUPABASE_PUBLIC_URL
              value: "https://supabase.arthurbarre.fr"
            - name: NEXT_PUBLIC_ENABLE_LOGS
              value: "true"
            - name: NEXT_ANALYTICS_BACKEND_PROVIDER
              value: postgres
            - name: SUPABASE_URL
              value: "http://supabase-kong.supabase.svc.cluster.local:8000"
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: anon-key
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: service-role-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/profile
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-studio
  namespace: supabase
spec:
  type: NodePort
  selector:
    app: supabase-studio
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30095
