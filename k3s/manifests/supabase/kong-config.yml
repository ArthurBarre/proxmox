apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: supabase
data:
  kong.yml: |
    _format_version: "2.1"
    _transform: true

    consumers:
      - username: DASHBOARD
      - username: anon
        keyauth_credentials:
          - key: SUPABASE_ANON_KEY_PLACEHOLDER
      - username: service_role
        keyauth_credentials:
          - key: SUPABASE_SERVICE_KEY_PLACEHOLDER

    acls:
      - consumer: anon
        group: anon
      - consumer: service_role
        group: admin

    services:
      # Auth - open routes (no API key needed)
      - name: auth-v1-open
        url: http://supabase-auth.supabase.svc.cluster.local:9999/verify
        routes:
          - name: auth-v1-open
            strip_path: true
            paths:
              - /auth/v1/verify
        plugins:
          - name: cors
      - name: auth-v1-open-callback
        url: http://supabase-auth.supabase.svc.cluster.local:9999/callback
        routes:
          - name: auth-v1-open-callback
            strip_path: true
            paths:
              - /auth/v1/callback
        plugins:
          - name: cors
      - name: auth-v1-open-authorize
        url: http://supabase-auth.supabase.svc.cluster.local:9999/authorize
        routes:
          - name: auth-v1-open-authorize
            strip_path: true
            paths:
              - /auth/v1/authorize
        plugins:
          - name: cors
      - name: auth-v1-open-jwks
        url: http://supabase-auth.supabase.svc.cluster.local:9999/.well-known/jwks.json
        routes:
          - name: auth-v1-open-jwks
            strip_path: true
            paths:
              - /auth/v1/.well-known/jwks.json
        plugins:
          - name: cors

      # Auth - protected routes
      - name: auth-v1
        url: http://supabase-auth.supabase.svc.cluster.local:9999/
        routes:
          - name: auth-v1-all
            strip_path: true
            paths:
              - /auth/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon

      # PostgREST
      - name: rest-v1
        url: http://supabase-rest.supabase.svc.cluster.local:3000/
        routes:
          - name: rest-v1-all
            strip_path: true
            paths:
              - /rest/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon

      # GraphQL (also via PostgREST)
      - name: graphql-v1
        url: http://supabase-rest.supabase.svc.cluster.local:3000/rpc/graphql
        routes:
          - name: graphql-v1
            strip_path: true
            paths:
              - /graphql/v1
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon

      # Realtime
      - name: realtime-v1
        url: http://supabase-realtime.supabase.svc.cluster.local:4000/socket/
        routes:
          - name: realtime-v1-all
            strip_path: true
            paths:
              - /realtime/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon

      # Storage
      - name: storage-v1
        url: http://supabase-storage.supabase.svc.cluster.local:5000/
        routes:
          - name: storage-v1-all
            strip_path: true
            paths:
              - /storage/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon

      # Meta (postgres-meta)
      - name: meta
        url: http://supabase-meta.supabase.svc.cluster.local:8080/
        routes:
          - name: meta-all
            strip_path: true
            paths:
              - /pg/
        plugins:
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
