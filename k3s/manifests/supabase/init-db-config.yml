apiVersion: v1
kind: ConfigMap
metadata:
  name: supabase-init-db
  namespace: supabase
data:
  init.sh: |
    #!/bin/bash
    set -e

    echo "Waiting for PostgreSQL to be ready..."
    until pg_isready -h supabase-db.supabase.svc.cluster.local -p 5432 -U postgres; do
      sleep 2
    done

    echo "Setting role passwords via supabase_admin..."
    PGPASSWORD="$POSTGRES_PASSWORD" psql -h supabase-db.supabase.svc.cluster.local -U supabase_admin -d postgres -c "ALTER ROLE authenticator WITH PASSWORD '$POSTGRES_PASSWORD';"
    PGPASSWORD="$POSTGRES_PASSWORD" psql -h supabase-db.supabase.svc.cluster.local -U supabase_admin -d postgres -c "ALTER ROLE supabase_auth_admin WITH PASSWORD '$POSTGRES_PASSWORD';"
    PGPASSWORD="$POSTGRES_PASSWORD" psql -h supabase-db.supabase.svc.cluster.local -U supabase_admin -d postgres -c "ALTER ROLE supabase_storage_admin WITH PASSWORD '$POSTGRES_PASSWORD';"

    PGPASSWORD="$POSTGRES_PASSWORD" psql -h supabase-db.supabase.svc.cluster.local -U supabase_admin -d postgres -c "
    GRANT anon TO authenticator;
    GRANT authenticated TO authenticator;
    GRANT service_role TO authenticator;
    GRANT anon TO supabase_storage_admin;
    GRANT authenticated TO supabase_storage_admin;
    CREATE SCHEMA IF NOT EXISTS _realtime;
    CREATE SCHEMA IF NOT EXISTS graphql_public;
    "

    echo "DB init complete!"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: supabase-init-db
  namespace: supabase
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-db
          image: supabase/postgres:15.8.1.085
          command: ["bash", "/scripts/init.sh"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: postgres-password
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: supabase-init-db
            defaultMode: 0755
