apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-realtime
  namespace: supabase
  labels:
    app: supabase-realtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-realtime
  template:
    metadata:
      labels:
        app: supabase-realtime
    spec:
      initContainers:
        - name: wait-for-db
          image: supabase/postgres:15.8.1.085
          command: ["sh", "-c", "until pg_isready -h supabase-db.supabase.svc.cluster.local -p 5432; do sleep 2; done"]
      containers:
        - name: realtime
          image: supabase/realtime:v2.34.47
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: DB_HOST
              value: supabase-db.supabase.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: supabase_admin
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: postgres-password
            - name: DB_NAME
              value: postgres
            - name: DB_AFTER_CONNECT_QUERY
              value: "SET search_path TO _realtime"
            - name: DB_ENC_KEY
              value: "supabaserealtime"
            - name: API_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: jwt-secret
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: secret-key-base
            - name: ERL_AFLAGS
              value: "-proto_dist inet_tcp"
            - name: DNS_NODES
              value: "''"
            - name: RLIMIT_NOFILE
              value: "10000"
            - name: APP_NAME
              value: realtime
            - name: SEED_SELF_HOST
              value: "true"
            - name: FLY_ALLOC_ID
              value: "fly123"
            - name: FLY_APP_NAME
              value: realtime
            - name: REPLICATION_MODE
              value: RLS
            - name: REPLICATION_POLL_INTERVAL
              value: "300"
            - name: SECURE_CHANNELS
              value: "true"
            - name: SLOT_NAME
              value: supabase_realtime_rls
            - name: TEMPORARY_SLOT
              value: "true"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-realtime
  namespace: supabase
spec:
  type: ClusterIP
  selector:
    app: supabase-realtime
  ports:
    - port: 4000
      targetPort: 4000
