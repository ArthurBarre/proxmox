apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-storage
  namespace: supabase
  labels:
    app: supabase-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-storage
  template:
    metadata:
      labels:
        app: supabase-storage
    spec:
      containers:
        - name: storage
          image: supabase/storage-api:v1.14.3
          ports:
            - containerPort: 5000
          env:
            - name: ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: anon-key
            - name: SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: service-role-key
            - name: POSTGREST_URL
              value: "http://supabase-rest.supabase.svc.cluster.local:3000"
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: storage-db-uri
            - name: FILE_SIZE_LIMIT
              value: "52428800"
            - name: STORAGE_BACKEND
              value: file
            - name: FILE_STORAGE_BACKEND_PATH
              value: /var/lib/storage
            - name: TENANT_ID
              value: stub
            - name: REGION
              value: stub
            - name: GLOBAL_S3_BUCKET
              value: stub
            - name: ENABLE_IMAGE_TRANSFORMATION
              value: "true"
            - name: IMGPROXY_URL
              value: "http://supabase-imgproxy.supabase.svc.cluster.local:5001"
          volumeMounts:
            - name: storage-data
              mountPath: /var/lib/storage
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /status
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: storage-data
          persistentVolumeClaim:
            claimName: supabase-storage-data
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-storage
  namespace: supabase
spec:
  type: ClusterIP
  selector:
    app: supabase-storage
  ports:
    - port: 5000
      targetPort: 5000
