apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-kong
  namespace: supabase
  labels:
    app: supabase-kong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-kong
  template:
    metadata:
      labels:
        app: supabase-kong
    spec:
      initContainers:
        - name: inject-keys
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              cp /config-template/kong.yml /config/kong.yml
              sed -i "s/SUPABASE_ANON_KEY_PLACEHOLDER/$ANON_KEY/g" /config/kong.yml
              sed -i "s/SUPABASE_SERVICE_KEY_PLACEHOLDER/$SERVICE_ROLE_KEY/g" /config/kong.yml
          env:
            - name: ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: anon-key
            - name: SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: service-role-key
          volumeMounts:
            - name: kong-config-template
              mountPath: /config-template
            - name: kong-config
              mountPath: /config
      containers:
        - name: kong
          image: kong:2.8.1
          ports:
            - containerPort: 8000
            - containerPort: 8443
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /config/kong.yml
            - name: KONG_DNS_ORDER
              value: LAST,A,CNAME
            - name: KONG_PLUGINS
              value: request-transformer,cors,key-auth,acl,basic-auth
            - name: KONG_NGINX_PROXY_PROXY_BUFFER_SIZE
              value: 160k
            - name: KONG_NGINX_PROXY_PROXY_BUFFERS
              value: 64 160k
          volumeMounts:
            - name: kong-config
              mountPath: /config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["kong", "health"]
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: kong-config-template
          configMap:
            name: kong-config
        - name: kong-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: supabase-kong
  namespace: supabase
spec:
  type: NodePort
  selector:
    app: supabase-kong
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
      nodePort: 30094
