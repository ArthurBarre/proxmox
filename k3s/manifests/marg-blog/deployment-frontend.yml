apiVersion: apps/v1
kind: Deployment
metadata:
  name: marg-blog-frontend
  namespace: marg-blog
  labels:
    app: marg-blog-frontend

spec:
  replicas: 1
  selector:
    matchLabels:
      app: marg-blog-frontend
  template:
    metadata:
      labels:
        app: marg-blog-frontend
    spec:
      imagePullSecrets:
        - name: gitea-registry
      containers:
        - name: frontend

          # ----------------------------------------------------
          # NB : VITE_API_URL est déjà BAKED dans cette image
          # au moment du `docker build --build-arg VITE_API_URL=...`
          # Donc cette image est SPÉCIFIQUE à un environnement
          # (chaque cible = un build différent).
          # ----------------------------------------------------
          image: git.arthurbarre.fr/ordinarthur/marg-blog-frontend:0.1.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80   # nginx écoute sur 80 (cf. nginx.conf)

          # nginx alpine ne consomme presque rien
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"

          # GET / sert index.html → 200
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
