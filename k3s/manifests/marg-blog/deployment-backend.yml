apiVersion: apps/v1
kind: Deployment
metadata:
  name: marg-blog-backend
  namespace: marg-blog
  labels:
    app: marg-blog-backend     # label pour identifier le Deployment

spec:
  # ----------------------------------------------------------
  # Combien de pods K3s doit faire tourner en parallèle.
  # Pour un blog perso : 1 suffit. (Pour de la HA : 2+.)
  # ----------------------------------------------------------
  replicas: 1

  # ----------------------------------------------------------
  # selector : "ce Deployment gère les pods qui ont CE label".
  # DOIT correspondre exactement aux labels du template ci-dessous.
  # C'est aussi ce label qui sera utilisé par le Service pour
  # router le trafic vers les bons pods.
  # ----------------------------------------------------------
  selector:
    matchLabels:
      app: marg-blog-backend

  # ----------------------------------------------------------
  # template = "un pod ressemble à ÇA" — c'est ici que tout se passe
  # ----------------------------------------------------------
  template:
    metadata:
      labels:
        app: marg-blog-backend  # ← MÊME label que matchLabels au-dessus

    spec:
      # --------------------------------------------------------
      # Pour pull une image privée du registry Gitea.
      # Ce Secret "gitea-registry" existe déjà sur le cluster
      # (utilisé par portfolio, freedge, etc.).
      # --------------------------------------------------------
      imagePullSecrets:
        - name: gitea-registry

      containers:
        - name: backend

          # ----------------------------------------------------
          # L'image Docker à pull. Format : registry/owner/repo:tag
          # On la pushera au cours 5 (CI Gitea).
          # ----------------------------------------------------
          image: git.arthurbarre.fr/ordinarthur/marg-blog-backend:0.1.0
          imagePullPolicy: IfNotPresent

          # ----------------------------------------------------
          # Le port exposé PAR le container (interne au pod).
          # Sera référencé par le Service via targetPort.
          # ----------------------------------------------------
          ports:
            - name: http
              containerPort: 3333

          # ----------------------------------------------------
          # Variables d'env :
          #   - env       : valeurs littérales (non-sensibles)
          #   - envFrom   : importe TOUTES les clés d'un Secret/ConfigMap
          # On charge "marg-blog-env" (Secret créé impérativement
          # via kubectl, hors Git) qui contient les mots de passe.
          # ----------------------------------------------------
          env:
            - name: NODE_ENV
              value: production
            - name: TZ
              value: UTC
            - name: PORT
              value: "3333"
            # IMPORTANT : 0.0.0.0 (pas "localhost") pour bind sur
            # toutes les interfaces du container, sinon le Service
            # ne peut pas joindre le process.
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: info
            - name: APP_URL
              value: https://api.blog.margotadam.fr
            - name: SESSION_DRIVER
              value: cookie
            - name: DRIVE_DISK
              value: s3
            - name: AWS_REGION
              value: us-east-1
            # MinIO via DNS interne K8s (cours 20)
            - name: S3_ENDPOINT
              value: http://minio.minio.svc.cluster.local:9000
            - name: S3_BUCKET
              value: marg-blog
            # Postgres : VM db en IP privée (cours 20)
            - name: PG_HOST
              value: "10.10.10.3"
            - name: PG_PORT
              value: "5432"
            - name: PG_DB_NAME
              value: marg_blog
            # Cette var déclenche `node ace migration:run` dans
            # docker-entrypoint.js au démarrage du container.
            - name: MIGRATE
              value: "true"
            # Domaine accepté par CORS (à corriger via cors.ts au cours 25)
            - name: CORS_ORIGIN
              value: https://blog.margotadam.fr
          envFrom:
            - secretRef:
                # Secret qu'on créera en impératif (cours 24)
                # contiendra : APP_KEY, PG_USER, PG_PASSWORD,
                #              AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
                name: marg-blog-env

          # ----------------------------------------------------
          # Resources : ce que le pod réserve / limite.
          #   requests : minimum garanti (utilisé par le scheduler
          #              pour décider sur quel nœud placer le pod)
          #   limits   : plafond. Au-delà, le pod est OOM-killed
          #              (mémoire) ou throttle (CPU).
          # ----------------------------------------------------
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "500m"

          # ----------------------------------------------------
          # Probes : K8s teste régulièrement la santé du pod.
          #
          # readinessProbe : "le pod est-il prêt à recevoir du
          #                   trafic ?" Tant qu'elle échoue, le
          #                   Service n'envoie PAS de requêtes
          #                   à ce pod. Utile au démarrage.
          #
          # livenessProbe  : "le pod est-il toujours vivant ?"
          #                   Si elle échoue N fois, K8s tue le
          #                   pod et en redémarre un.
          #
          # On tape sur GET /  qui retourne {hello:'world'} sans
          # toucher la DB (cf. start/routes.ts).
          # ----------------------------------------------------
          readinessProbe:
            httpGet:
              path: /
              port: 3333
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3333
            initialDelaySeconds: 30
            periodSeconds: 30
