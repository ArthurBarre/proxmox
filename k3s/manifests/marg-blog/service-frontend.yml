apiVersion: v1
kind: Service
metadata:
  name: marg-blog-frontend
  namespace: marg-blog

spec:
  type: NodePort
  selector:
    app: marg-blog-frontend
  ports:
    - name: http
      port: 80          # port "interne" cluster
      targetPort: 80    # port nginx dans le container
      nodePort: 30108   # ← exposé par K3s aux nœuds, vu par Traefik
