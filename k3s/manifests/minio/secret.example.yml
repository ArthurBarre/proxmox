# Génère un secret aléatoire et crée-le avec :
#   PWD=$(openssl rand -base64 24 | tr -d '/+=')
#   kubectl -n minio create secret generic minio-credentials \
#     --from-literal=root-user=admin \
#     --from-literal=root-password="$PWD"
# Stocke le pwd dans un password manager — il est utilisé pour
# l'admin console MinIO et l'API S3.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: minio
type: Opaque
stringData:
  root-user: admin
  root-password: CHANGE_ME
