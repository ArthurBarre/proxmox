apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-data
  namespace: holyclaude
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workspace
  namespace: holyclaude
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
