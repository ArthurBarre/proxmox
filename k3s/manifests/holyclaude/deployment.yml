apiVersion: apps/v1
kind: Deployment
metadata:
  name: holyclaude
  namespace: holyclaude
  labels:
    app: holyclaude
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: holyclaude
  template:
    metadata:
      labels:
        app: holyclaude
    spec:
      containers:
        - name: holyclaude
          image: coderluii/holyclaude:1.2.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: web
              containerPort: 3001
          env:
            - name: TZ
              value: "Europe/Paris"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=2048"
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_PTRACE
            seccompProfile:
              type: Unconfined
          volumeMounts:
            - name: claude-data
              mountPath: /home/claude/.claude
            - name: workspace
              mountPath: /workspace
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "2560Mi"
              cpu: "2000m"
      volumes:
        - name: claude-data
          persistentVolumeClaim:
            claimName: claude-data
        - name: workspace
          persistentVolumeClaim:
            claimName: workspace
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
