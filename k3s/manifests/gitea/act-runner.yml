apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-act-runner
  namespace: gitea
  labels:
    app: gitea-act-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-act-runner
  template:
    metadata:
      labels:
        app: gitea-act-runner
    spec:
      # Forcer le scheduling sur le worker (qui a Docker)
      nodeSelector:
        kubernetes.io/hostname: k3s-worker
      containers:
        - name: runner
          image: gitea/act_runner:latest
          env:
            - name: DOCKER_HOST
              value: "unix:///var/run/docker.sock"
            - name: CONFIG_FILE
              value: "/etc/act-runner/config.yml"
            - name: GITEA_INSTANCE_URL
              value: "http://10.10.10.5:30080"
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: runner-token
            - name: GITEA_RUNNER_NAME
              value: "k3s-worker"
            - name: GITEA_RUNNER_LABELS
              value: "ubuntu-latest:docker://catthehacker/ubuntu:act-22.04,self-hosted:host"
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: runner-config
              mountPath: /etc/act-runner
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: runner-config
          configMap:
            name: act-runner-config
