---
- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Update apt cache and upgrade
  apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name: "{{ common_packages }}"
    state: present

- name: Enable and start qemu-guest-agent
  systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Configure SSH hardening
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config.d/hardening.conf
    mode: "0644"
  notify: restart sshd

- name: Configure fail2ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: restart fail2ban

- name: Enable fail2ban
  systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Enable unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: "0644"

- name: Install Tailscale
  shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale

- name: Connect to Tailscale
  command: "tailscale up --authkey={{ tailscale_auth_key }} {{ tailscale_extra_args }}"
  when: tailscale_auth_key | length > 0
  register: tailscale_result
  changed_when: "'already' not in tailscale_result.stderr"
  failed_when: false
