---
- name: Set timezone
  timezone:
    name: "{{ timezone }}"

- name: Update apt cache and upgrade
  apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name: "{{ common_packages }}"
    state: present

- name: Enable and start qemu-guest-agent
  systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Configure SSH hardening
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config.d/hardening.conf
    mode: "0644"
  notify: restart sshd

- name: Configure fail2ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: restart fail2ban

- name: Enable fail2ban
  systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Enable unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: "0644"

- name: Deploy disk cleanup script
  template:
    src: disk-cleanup.sh.j2
    dest: /usr/local/bin/disk-cleanup.sh
    mode: "0755"

- name: Deploy disk cleanup timer
  template:
    src: disk-cleanup.timer.j2
    dest: /etc/systemd/system/disk-cleanup.timer
    mode: "0644"

- name: Deploy disk cleanup service
  template:
    src: disk-cleanup.service.j2
    dest: /etc/systemd/system/disk-cleanup.service
    mode: "0644"

- name: Enable disk cleanup timer
  systemd:
    name: disk-cleanup.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Install Tailscale
  shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale

- name: Connect to Tailscale
  command: "tailscale up --authkey={{ tailscale_auth_key }} {{ tailscale_extra_args }}"
  when: tailscale_auth_key | length > 0
  register: tailscale_result
  changed_when: "'already' not in tailscale_result.stderr"
  failed_when: false

# ---------------------------------------------------------------------------
# DNS fix: Tailscale MagicDNS (100.100.100.100) est instable et casse la
# résolution DNS au reboot (images docker KO, pods ImagePullBackOff).
# On désactive MagicDNS et on force un resolv.conf figé + immutable pour que
# tailscaled ne puisse plus l'écraser.
# ---------------------------------------------------------------------------
- name: Disable Tailscale MagicDNS override
  command: tailscale set --accept-dns=false
  changed_when: false
  failed_when: false

- name: Stop systemd-resolved (empêche toute réécriture du resolv.conf)
  systemd:
    name: systemd-resolved
    enabled: false
    state: stopped
  failed_when: false

- name: Remove immutable flag before rewriting resolv.conf
  command: chattr -i /etc/resolv.conf
  changed_when: false
  failed_when: false

- name: Write pinned /etc/resolv.conf (1.1.1.1 + 8.8.8.8)
  copy:
    dest: /etc/resolv.conf
    content: |
      # Managed by Ansible — DO NOT EDIT (immutable, use chattr -i to modify)
      nameserver 1.1.1.1
      nameserver 8.8.8.8
      nameserver 9.9.9.9
      options timeout:2 attempts:2
    mode: "0644"
  register: resolv_written

- name: Make /etc/resolv.conf immutable
  command: chattr +i /etc/resolv.conf
  changed_when: resolv_written.changed
  failed_when: false
