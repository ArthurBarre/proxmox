---
- name: Create Traefik directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ traefik_install_dir }}"
    - "{{ traefik_config_dir }}"
    - "{{ traefik_config_dir }}/dynamic"
    - /var/log/traefik

- name: Download Traefik binary
  get_url:
    url: "https://github.com/traefik/traefik/releases/download/v{{ traefik_version }}.0/traefik_v{{ traefik_version }}.0_linux_amd64.tar.gz"
    dest: /tmp/traefik.tar.gz
    mode: "0644"

- name: Extract Traefik
  unarchive:
    src: /tmp/traefik.tar.gz
    dest: "{{ traefik_install_dir }}"
    remote_src: yes
    creates: "{{ traefik_install_dir }}/traefik"

- name: Symlink Traefik to /usr/local/bin
  file:
    src: "{{ traefik_install_dir }}/traefik"
    dest: /usr/local/bin/traefik
    state: link
    force: true

- name: Create Traefik static config
  template:
    src: traefik.yml.j2
    dest: "{{ traefik_config_dir }}/traefik.yml"
    mode: "0644"
  notify: restart traefik

- name: Create ACME storage file
  file:
    path: "{{ traefik_config_dir }}/acme.json"
    state: touch
    mode: "0600"

- name: Deploy shared middlewares config
  template:
    src: middlewares.yml.j2
    dest: "{{ traefik_config_dir }}/dynamic/middlewares.yml"
    mode: "0644"

