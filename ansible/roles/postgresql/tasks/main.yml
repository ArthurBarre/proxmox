---
- name: Install PostgreSQL
  apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - "postgresql-client-{{ postgresql_version }}"
      - python3-psycopg2
    state: present

- name: Configure PostgreSQL listen addresses
  lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
  notify: restart postgresql

- name: Configure PostgreSQL max connections
  lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?max_connections"
    line: "max_connections = {{ postgresql_max_connections }}"
  notify: restart postgresql

- name: Allow private network connections in pg_hba
  lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    line: "host    all    all    {{ item }}    scram-sha-256"
    insertafter: "^# IPv4 local connections"
  loop: "{{ postgresql_allowed_networks }}"
  notify: restart postgresql

- name: Enable and start PostgreSQL
  systemd:
    name: postgresql
    enabled: true
    state: started

- name: Create backup directory
  file:
    path: "{{ postgresql_backup_dir }}"
    state: directory
    owner: postgres
    mode: "0700"
  when: postgresql_backup_enabled

- name: Setup daily backup cron
  cron:
    name: "PostgreSQL daily backup"
    user: postgres
    hour: "3"
    minute: "0"
    job: "pg_dumpall | gzip > {{ postgresql_backup_dir }}/all_$(date +\\%Y\\%m\\%d).sql.gz && find {{ postgresql_backup_dir }} -mtime +{{ postgresql_backup_retention_days }} -delete"
  when: postgresql_backup_enabled
