---
- name: Setup pi-gen build environment
  hosts: pi_gen
  become: true

  tasks:
    - name: Install pi-gen dependencies
      apt:
        name:
          - git
          - coreutils
          - quilt
          - parted
          - debootstrap
          - zerofree
          - zip
          - dosfstools
          - libarchive-tools
          - libcap2-bin
          - grep
          - rsync
          - xz-utils
          - file
          - binfmt-support
          - qemu-user-static
          - pigz
          - arch-test
          - curl
          - bc
          - xxd
          - kmod
        state: present
        update_cache: true

    - name: Install Node.js 22 LTS
      shell: |
        if ! node --version 2>/dev/null | grep -q 'v22'; then
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs
        fi
      args:
        creates: /usr/bin/node

    - name: Install pnpm
      npm:
        name: pnpm
        global: true
        state: present

    - name: Create build directory
      file:
        path: /home/arthur/build
        state: directory
        owner: arthur
        group: arthur
        mode: "0755"
